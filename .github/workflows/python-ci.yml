name: Python CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check code formatting with black
        run: black --check src/ tests/

      - name: Check import ordering with isort
        run: isort --check-only src/ tests/

      - name: Lint with flake8
        run: "flake8 src/ --max-complexity=10 --extend-ignore=E203,E501,W503"

      - name: Lint with pylint
        run: "pylint src/ --fail-under=7.0 --max-line-length=100 || true"

      - name: Type check with mypy
        run: "mypy src/ --ignore-missing-imports || true"

      - name: Check McCabe complexity
        run: |
          find src/ -name "*.py" -exec python -m mccabe --min 10 {} + || echo "McCabe: complexity issues found (threshold=10)"

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: .coverage
